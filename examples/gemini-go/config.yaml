# 服务端监听配置
server:
  host: "0.0.0.0"
  port: 4399

# WebSocket 认证（为空则跳过验证）
auth:
  username: ""
  password: ""

# HTTP 代理（可选，用于无法直连 API 时，如 http://127.0.0.1:7890 或 socks5://127.0.0.1:1080）
# proxy: "http://127.0.0.1:7890"

# Gemini API 配置
gemini:
  # API 密钥（也可通过环境变量 GEMINI_API_KEY 设置，环境变量优先）
  api_key: "你的 API KEY"
  model: "gemini-2.0-flash-live-001"
  # 系统提示词
  system_instruction: "你是小爱音箱，请用中文回答用户的问题。"
  # 语音合成配置
  speech:
    language: "cmn-CN"
    voice: "Leda"

# 打断配置：仅当关键词或唤醒词匹配时才打断（与 gpt-go 统一）
interrupt:
  keywords:
    - "召唤小智"
    - "小智"
  match_mode: "exact"    # exact, prefix, contains
  kws_interrupt: true   # 唤醒词也触发打断

# 连接成功后播放的提示语
greeting: "已连接"
