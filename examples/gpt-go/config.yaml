# 服务端监听配置
server:
  host: "0.0.0.0"
  port: 4399

# WebSocket 认证（为空则跳过验证）
auth:
  username: ""
  password: ""

# OpenAI API 配置（支持兼容 OpenAI 接口的第三方服务，如 DeepSeek）
openai:
  # 接口地址，以 /v1 结尾
  base_url: "https://api.openai.com/v1"
  # base_url: "https://api.deepseek.com/v1"
  # API 密钥
  api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  # 模型名称  
  model: "gpt-4.1-mini"
  # model: "deepseek-chat"

# 系统提示词
prompt:
  system: "你是一个智能助手，请根据用户的问题给出回答。"

# 上下文配置
context:
  # 每次对话携带的最大历史消息数（0 = 关闭）
  history_max_length: 10

# 打断配置：仅当关键词或唤醒词匹配时才打断（与 gemini-go 统一）
interrupt:
  keywords:
    - "请"
    - "你"
    - "小爱同学"
  match_mode: "prefix"   # exact, prefix, contains
  kws_interrupt: true   # 唤醒词也触发打断

# 只回答以下关键词开头的消息（用于 AI 回复判断）
call_ai_keywords:
  - "请"
  - "你"

# 连接成功后播放的提示语
greeting: "已连接"

# 出错时的提示语
error_message: "出错了，请稍后再试吧！"

# 自定义固定回复（精确匹配用户消息）
custom_replies:
  - match: "测试播放文字"
    text: "你好，很高兴认识你！"
  - match: "测试播放音乐"
    url: "https://example.com/hello.mp3"
